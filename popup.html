<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 280px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      background: #0f0f0f;
      color: #e8e8e8;
      padding: 16px;
    }

    h1 {
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      margin-bottom: 14px;
      letter-spacing: 0.3px;
    }

    .section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #666;
      margin-bottom: 6px;
    }

    .btn-group {
      display: flex;
      gap: 6px;
      margin-bottom: 14px;
    }

    .btn {
      flex: 1;
      padding: 8px 0;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      background: #1a1a1a;
      color: #aaa;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn:hover { border-color: #444; color: #ddd; }

    .btn.active {
      background: #1d3a2a;
      border-color: #2d6b45;
      color: #4ade80;
    }

    .select-wrapper {
      position: relative;
      margin-bottom: 14px;
    }

    .select-wrapper::after {
      content: "▾";
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      color: #666;
      pointer-events: none;
      font-size: 12px;
    }

    select {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      color: #e8e8e8;
      font-size: 12px;
      margin-bottom: 0;
      appearance: none;
      cursor: pointer;
    }

    select:focus { outline: none; border-color: #2d6b45; }

    .hidden { display: none; }

    #run-btn {
      width: 100%;
      padding: 10px;
      background: #2d6b45;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #run-btn:hover { background: #38855a; }
    #run-btn:disabled { background: #1a1a1a; color: #444; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      font-size: 11px;
      line-height: 1.6;
      color: #888;
      min-height: 16px;
    }

    #status .ok   { color: #4ade80; }
    #status .skip { color: #facc15; }
    #status .err  { color: #f87171; }
  </style>
</head>
<body>

  <h1>SwiftFill</h1>

  <div class="section-label">Mode</div>
  <div class="btn-group">
    <button class="btn active" data-mode="autofill">Application</button>
    <button class="btn"        data-mode="signup">Sign Up</button>
    <button class="btn"        data-mode="login">Log In</button>
  </div>

  <div class="section-label">Email</div>
  <div class="select-wrapper">
    <select id="email-select">
      <option value="email_fulltime">Full-time</option>
      <option value="email_parttime">Part-time</option>
    </select>
  </div>

  <div id="password-section" class="hidden">
    <div class="section-label">Password</div>
    <div class="select-wrapper">
      <select id="password-select">
        <option value="standard">Standard</option>
        <option value="strong">Strong (17+ chars)</option>
      </select>
    </div>
  </div>

  <button id="run-btn">Fill Fields</button>

  <div id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
